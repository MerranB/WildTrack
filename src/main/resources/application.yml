spring:
  application:
    name: wildtrack

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  threads:
    virtual:
      enabled: true

server:
  port: 8080
  servlet:
    context-path: /

app:
  wildtrack-api:
    base-url: https://api.wildtrack.com
